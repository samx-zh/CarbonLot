  <!-- React Code with Babel -->

    const { useState, useEffect, useRef } = React;

    // --- CUSTOM INLINE SVG ICONS WRAPPER ---

      const icons = {

        ),
        search: (
          <svg fill="none" viewBox="0 0 24 24" strokeWidth="2" stroke="currentColor" className={className} style={styles} {...props}>
            <path strokeLinecap="round" strokeLinejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.602 10.602Z" />

        ),
        filter: (

        send: (
          <svg fill="none" viewBox="0 0 24 24" strokeWidth="2" stroke="currentColor" className={className} style={styles} {...props}>
            <path strokeLinecap="round" strokeLinejoin="round" d="M6 12 3.269 3.125A59.769 59.769 0 0 1 21.485 12 59.768 59.768 0 0 1 3.27 20.875L5.999 12Zm0 0h7.5" />

        ),
        refreshCw: (

          </svg>
        ),
        checkCircle: (
          <svg fill="none" viewBox="0 0 24 24" strokeWidth="2" stroke="currentColor" className={className} style={styles} {...props}>
            <path strokeLinecap="round" strokeLinejoin="round" d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
          </svg>
        ),
        alertTriangle: (
          <svg fill="none" viewBox="0 0 24 24" strokeWidth="2" stroke="currentColor" className={className} style={styles} {...props}>
            <path strokeLinecap="round" strokeLinejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126ZM12 15.75h.007v.008H12v-.008Z" />
          </svg>
        ),
        x: (
          <svg fill="none" viewBox="0 0 24 24" strokeWidth="2" stroke="currentColor" className={className} style={styles} {...props}>

      };

      return icons[name] || (
        <svg fill="none" viewBox="0 0 24 24" strokeWidth="2" stroke="currentColor" className={className} style={styles} {...props}>
          <circle cx="12" cy="12" r="10" />
        </svg>
      );
    };

    // --- MOCK DATA ---
    const INITIAL_SHIPMENTS = [
      { id: "SHP001", material: "Steel Rebars", cnCode: "7214", qty: 12500, origin: "China", emissions: 4120, intensity: 0.33, status: "CBAM Ready" },
      { id: "SHP002", material: "Portland Cement", cnCode: "2523", qty: 15000, origin: "Turkey", emissions: 1850, intensity: 0.12, status: "Pending Validation" },
      { id: "SHP003", material: "Aluminium Sheets", cnCode: "7606", qty: 8000, origin: "India", emissions: 8430, intensity: 1.05, status: "Pending Validation" },
      { id: "SHP004", material: "Seamless Iron Pipes", cnCode: "7304", qty: 10000, origin: "UAE", emissions: 3120, intensity: 0.31, status: "CBAM Ready" },
      { id: "SHP005", material: "Galvanized Steel Wire", cnCode: "7217", qty: 3000, origin: "India", emissions: 900, intensity: 0.30, status: "CBAM Ready" },
    ];

    const SUPPLIERS = [
      { name: "Nordic Green Metals", country: "Sweden", intensity: 0.15, price: 2850, rating: 4.9, badge: "Eco-Recommended", material: "Aluminium" },
      { name: "SinoSteel Carbon-Free", country: "China", intensity: 0.35, price: 820, rating: 4.7, badge: "Eco-Recommended", material: "Steel" },
      { name: "Anadolu Eco-Cement", country: "Turkey", intensity: 0.08, price: 95, rating: 4.8, badge: "Eco-Recommended", material: "Cement" },
      { name: "Emirates Steel Ind", country: "UAE", intensity: 0.78, price: 780, rating: 4.2, badge: "Standard", material: "Steel" },
      { name: "Vedanta Eco-Aluminium", country: "India", intensity: 0.45, price: 2500, rating: 4.5, badge: "Eco-Recommended", material: "Aluminium" }
    ];

    // --- MAIN REACT COMPONENT ---
    function App() {
      // Navigation state
      const [activeTab, setActiveTab] = useState("dashboard"); // dashboard, shipments, suppliers, declarations, assistant
      
      // DB States
      const [shipments, setShipments] = useState(INITIAL_SHIPMENTS);
      const [shipmentFilter, setShipmentFilter] = useState("All");
      const [supplierMaterialFilter, setSupplierMaterialFilter] = useState("All");

      // Interactive Action Loaders
      const [validatingShipment, setValidatingShipment] = useState(null);
      const [calculatingShipment, setCalculatingShipment] = useState(null);

      // AI Chat State
      const [chatMessages, setChatMessages] = useState([
        {
          sender: "user",
          text: "What is the emission compliance status of shipment SHP003?"
        },
        {
          sender: "system",
          type: "mcp_tool_call",
          toolName: "database.get_shipment",
          args: { shipment_id: "SHP003" },
          result: { id: "SHP003", material: "Aluminium Sheets", cnCode: "7606", qty: 8000, origin: "India", status: "Pending Validation" }
        },
        {
          sender: "system",
          type: "mcp_tool_call",
          toolName: "compliance.calculate_emissions",
          args: { material: "Aluminium Sheets", qty: 8000, origin: "India" },
          result: { embeddedCo2Kg: 8430, intensity: 1.05, benchmark: 0.8, exceeds: true }
        },
        {
          sender: "agent",
          text: "I have calculated the embedded carbon for **SHP003 (Aluminium Sheets)**. Total emissions are **8,430 kg CO₂** with an intensity of **1.05 kgCO₂/kg**.\n\n⚠️ This exceeds the EU CBAM benchmark limit of **0.80 kgCO₂/kg** by **31%**. I recommend checking alternative green suppliers like **Nordic Green Metals** (intensity **0.15 kgCO₂/kg**) to optimize compliance."
        }
      ]);
      const [chatInput, setChatInput] = useState("");
      const [isAgentTyping, setIsAgentTyping] = useState(false);
      const [activeMcpCalling, setActiveMcpCalling] = useState(null);
      
      // CBAM Declaration Generator State
      const [declarationStatus, setDeclarationStatus] = useState("idle"); // idle, compiling, generated
      const [compilationLogs, setCompilationLogs] = useState([]);
      const [expandedArch, setExpandedArch] = useState(true);

      const chatEndRef = useRef(null);

      // Scroll to bottom of chat
      useEffect(() => {
        chatEndRef.current?.scrollIntoView({ behavior: 'smooth' });
      }, [chatMessages, isAgentTyping, activeMcpCalling]);

      // Calculate Metrics
      const totalCO2 = shipments.reduce((sum, s) => sum + s.emissions, 0);
      const activeShipmentsCount = shipments.filter(s => s.status !== "Declaring").length;
      
      // Trigger validation simulation
      const handleValidateCN = (id) => {
        setValidatingShipment(id);
        
        // Log in Chat
        const queryMsg = {
          sender: "user",
          text: `Verify Customs CN classification and validate shipment ${id}`
        };
        setChatMessages(prev => [...prev, queryMsg]);

        setTimeout(() => {
          // Add Tool Call
          const toolCall = {
            sender: "system",
            type: "mcp_tool_call",
            toolName: "compliance.verify_cn_code",
            args: { shipment_id: id, cn_code: shipments.find(s => s.id === id).cnCode },
            result: { valid: true, description: "Base metals and articles of base metal - Aluminium sheets", standardRateApplied: true }
          };
          
          setShipments(prev => prev.map(s => s.id === id ? { ...s, status: "CBAM Ready" } : s));
          setValidatingShipment(null);
          
          const agentReply = {
            sender: "agent",
            text: `Successfully validated CN Code classification for **${id}**. Custom database validation returned matching tariff schema for Aluminium Sheets. The shipment is now marked as **CBAM Ready**.`
          };

          setChatMessages(prev => [...prev, toolCall, agentReply]);
        }, 1500);
      };

      // Trigger Emissions Recalculate
      const handleRecalculate = (id) => {
        setCalculatingShipment(id);

        const queryMsg = {
          sender: "user",
          text: `Recalculate embedded carbon parameters for ${id}`
        };
        setChatMessages(prev => [...prev, queryMsg]);

        setTimeout(() => {
          const s = shipments.find(item => item.id === id);
          const toolCall = {
            sender: "system",
            type: "mcp_tool_call",
            toolName: "compliance.calculate_emissions",
            args: { material: s.material, qty: s.qty, origin: s.origin },
            result: { embeddedCo2Kg: s.emissions, intensity: s.intensity, validatedSource: "EU CBAM Database v2026.1" }
          };
          
          setCalculatingShipment(null);
          const agentReply = {
            sender: "agent",
            text: `Calculations refreshed for **${id}**. Calculated intensity of **${s.intensity} kgCO₂/kg** verified against direct manufacturer supplier disclosure. No discrepancies found.`
          };

          setChatMessages(prev => [...prev, toolCall, agentReply]);
        }, 1200);
      };

      // Send Chat Message
      const handleSendChat = (e) => {
        e.preventDefault();
        if (!chatInput.trim()) return;

        const userMsg = { sender: "user", text: chatInput };
        setChatMessages(prev => [...prev, userMsg]);
        const currentInput = chatInput.toLowerCase();
        setChatInput("");
        setIsAgentTyping(true);

        // Simulation response based on user input
        setTimeout(() => {
          if (currentInput.includes("shp002") || currentInput.includes("portland")) {
            // Simulate MCP Database & calculation call
            setActiveMcpCalling("database.get_shipment");
            setTimeout(() => {
              const toolCall1 = {
                sender: "system",
                type: "mcp_tool_call",
                toolName: "database.get_shipment",
                args: { shipment_id: "SHP002" },
                result: { id: "SHP002", material: "Portland Cement", cnCode: "2523", qty: 15000, origin: "Turkey", emissions: 1850 }
              };
              setChatMessages(prev => [...prev, toolCall1]);
              
              setActiveMcpCalling("compliance.calculate_emissions");
              setTimeout(() => {
                const toolCall2 = {
                  sender: "system",
                  type: "mcp_tool_call",
                  toolName: "compliance.calculate_emissions",
                  args: { material: "Portland Cement", qty: 15000, origin: "Turkey" },
                  result: { embeddedCo2Kg: 1850, intensity: 0.12, status: "COMPLIANT" }
                };
                setChatMessages(prev => [...prev, toolCall2]);
                setActiveMcpCalling(null);
                setIsAgentTyping(false);

                const reply = {
                  sender: "agent",
                  text: "Shipment **SHP002 (Portland Cement)** from Turkey has an intensity of **0.12 kgCO₂/kg** which is well within the acceptable threshold parameters. I have flagged the validation status as compliant. You can finalize this declaration."
                };
                setChatMessages(prev => [...prev, reply]);

                          <span className="w-1.5 h-1.5 rounded-full bg-slate-500 animate-bounce" style={{ animationDelay: '150ms' }}></span>
                          <span className="w-1.5 h-1.5 rounded-full bg-slate-500 animate-bounce" style={{ animationDelay: '300ms' }}></span>

                      </div>
                    </div>
                  )}
                  
                  <div ref={chatEndRef} />
                </div>

                {/* Pre-made Query Recommendations panel */}
                <div className="p-3 border-t border-slate-800/80 bg-slate-950/60">
                  <span className="text-[9px] uppercase tracking-wider text-slate-500 font-bold block mb-2">Predefined Agent Queries</span>

                    {[
                      { query: "Verify SHP002 emissions", actionText: "What is the compliance for SHP002?" },

                    value={chatInput}
                    onChange={(e) => setChatInput(e.target.value)}
                    placeholder="Ask Claude about CBAM carbon ledger..."
                    className="flex-1 bg-slate-950 border border-slate-800 hover:border-slate-700 focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 outline-none text-xs rounded-xl px-3 py-2.5 text-slate-100 transition"
                  />
                  <button
                    type="submit"
                    className="w-9 h-9 rounded-xl bg-emerald-500 hover:bg-emerald-400 text-slate-950 flex items-center justify-center transition shrink-0 shadow-lg shadow-emerald-500/10"
                  >
                    <Icon name="send" className="w-4.5 h-4.5" />
                  </button>
                </form>

              </div>

            </div>

          </main>
        </div>
      );

    // Mount React App
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
